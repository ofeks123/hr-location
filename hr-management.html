<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול משאבי אנוש - מיקום עובדים</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            direction: rtl;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        h2 {
            color: #555;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        /* User Section */
        .user-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #545b62;
        }

        .btn-admin {
            background: #28a745;
            color: white;
            margin-top: 20px;
        }

        .btn-admin:hover {
            background: #218838;
        }

        .btn-logout {
            background: #dc3545;
            color: white;
        }

        .btn-logout:hover {
            background: #c82333;
        }

        /* Status Colors */
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
        }

        .status-home { background: #e3f2fd; color: #1565c0; }
        .status-going-home { background: #fff3e0; color: #ef6c00; }
        .status-base { background: #e8f5e9; color: #2e7d32; }
        .status-going-base { background: #f3e5f5; color: #7b1fa2; }
        .status-rehovot { background: #fce4ec; color: #c2185b; }
        .status-going-rehovot { background: #fff8e1; color: #ff8f00; }
        .status-108 { background: #e0f2f1; color: #00695c; }

        /* Admin Table */
        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .employees-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .employees-table th, .employees-table td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }

        .employees-table th {
            background: #f8f9fa;
            font-weight: bold;
            color: #333;
        }

        .employees-table tr:hover {
            background: #f8f9fa;
        }

        .last-update {
            font-size: 12px;
            color: #888;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {
            margin-top: 0;
        }

        /* Success Message */
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            text-align: center;
        }

        .success-message.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            text-align: center;
        }

        .error-message.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            .employees-table th, .employees-table td {
                padding: 10px 5px;
                font-size: 14px;
            }
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .current-user {
            background: #e3f2fd;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }

        .no-employees {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .online-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #28a745;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>

        // State
        let currentUser = localStorage.getItem('hr_user_name') || '';
        let currentUserId = localStorage.getItem('hr_user_id') || '';
        let isAdmin = false;
        let pollingInterval = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (currentUser && currentUserId) {
                showStatusSection();
                loadCurrentStatus();
            }

            document.getElementById('adminPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyAdmin();
            });
        });

        // ============================================
        // API Functions
        // ============================================

        async function getEmployeesFromServer() {
            if (USE_LOCAL_STORAGE) {
                const data = localStorage.getItem('hr_employees');
                return data ? JSON.parse(data) : {};
            }

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': JSONBIN_API_KEY
                    }
                });
                if (!response.ok) {
                    console.error('API Error:', response.status, response.statusText);
                    const text = await response.text();
                    console.error('Response:', text);
                    alert('שגיאה בחיבור לשרת: ' + response.status);
                    return {};
                }
                const data = await response.json();
                return data.record.employees || {};
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('שגיאה בחיבור: ' + error.message);
                return {};
            }
        }

        async function saveEmployeesToServer(employees) {
            if (USE_LOCAL_STORAGE) {
                localStorage.setItem('hr_employees', JSON.stringify(employees));
                return true;
            }

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify({ employees: employees })
                });
                if (!response.ok) {
                    console.error('API Error:', response.status, response.statusText);
                    const text = await response.text();
                    console.error('Response:', text);
                    alert('שגיאה בשמירה: ' + response.status);
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Error saving data:', error);
                alert('שגיאה בשמירה: ' + error.message);
                return false;
            }
        }

        // ============================================
        // User Functions
        // ============================================

        function saveName() {
            const name = document.getElementById('userName').value;
            if (!name) {
                alert('נא לבחור שם');
                return;
            }

            currentUser = name;
            // Use name as ID so same person from different devices updates same record
            currentUserId = name.replace(/\s+/g, '_');
            localStorage.setItem('hr_user_name', currentUser);
            localStorage.setItem('hr_user_id', currentUserId);

            showStatusSection();
            loadCurrentStatus();
        }

        function showStatusSection() {
            document.getElementById('nameInputGroup').style.display = 'none';
            document.getElementById('statusSection').style.display = 'block';
            document.getElementById('currentUserDisplay').textContent = 'שלום, ' + currentUser;
        }

        function changeName() {
            document.getElementById('nameInputGroup').style.display = 'block';
            document.getElementById('statusSection').style.display = 'none';
            document.getElementById('userName').value = currentUser;
        }

        async function loadCurrentStatus() {
            if (!currentUserId) return;

            const employees = await getEmployeesFromServer();
            if (employees[currentUserId] && employees[currentUserId].status) {
                document.getElementById('statusSelect').value = employees[currentUserId].status;
            }
        }

        async function updateStatus() {
            const status = document.getElementById('statusSelect').value;
            if (!status) {
                alert('נא לבחור מיקום');
                return;
            }
            if (!currentUserId) {
                alert('נא להכניס שם קודם');
                return;
            }

            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.textContent = 'מעדכן...';

            try {
                // Get current data
                const employees = await getEmployeesFromServer();

                // Update employee
                employees[currentUserId] = {
                    name: currentUser,
                    status: status,
                    lastUpdate: new Date().toISOString()
                };

                // Save back
                const success = await saveEmployeesToServer(employees);

                if (success) {
                    showSuccessMessage();
                    if (isAdmin) {
                        updateEmployeesTable(employees);
                    }
                } else {
                    showErrorMessage();
                }
            } catch (error) {
                console.error('Error updating status:', error);
                showErrorMessage();
            }

            btn.disabled = false;
            btn.textContent = 'עדכן מיקום';
        }

        function showSuccessMessage() {
            const msg = document.getElementById('successMessage');
            msg.classList.add('active');
            document.getElementById('errorMessage').classList.remove('active');
            setTimeout(() => {
                msg.classList.remove('active');
            }, 2000);
        }

        function showErrorMessage() {
            const msg = document.getElementById('errorMessage');
            msg.classList.add('active');
            document.getElementById('successMessage').classList.remove('active');
            setTimeout(() => {
                msg.classList.remove('active');
            }, 3000);
        }

        // ============================================
        // Admin Functions
        // ============================================

        function showAdminModal() {
            document.getElementById('adminModal').classList.add('active');
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminError').style.display = 'none';
            document.getElementById('adminPassword').focus();
        }

        function hideAdminModal() {
            document.getElementById('adminModal').classList.remove('active');
        }

        function verifyAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                hideAdminModal();
                showAdminSection();
            } else {
                document.getElementById('adminError').style.display = 'block';
            }
        }

        async function showAdminSection() {
            document.getElementById('adminSection').classList.add('active');
            document.getElementById('adminBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';

            // Load initial data
            await refreshAdminData();

            // Poll for updates every 3 seconds
            pollingInterval = setInterval(refreshAdminData, 3000);
        }

        async function refreshAdminData() {
            const employees = await getEmployeesFromServer();
            updateEmployeesTable(employees);
        }

        function logoutAdmin() {
            isAdmin = false;
            document.getElementById('adminSection').classList.remove('active');
            document.getElementById('adminBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';

            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }

        function updateEmployeesTable(employees) {
            const tbody = document.getElementById('employeesTableBody');

            if (!employees || Object.keys(employees).length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-employees">אין עובדים רשומים</td></tr>';
                return;
            }

            let html = '';
            const employeeArray = Object.entries(employees).map(([id, data]) => ({
                id,
                ...data
            }));

            // Sort by last update (newest first)
            employeeArray.sort((a, b) => new Date(b.lastUpdate) - new Date(a.lastUpdate));

            employeeArray.forEach(emp => {
                const statusClass = getStatusClass(emp.status);
                const lastUpdate = formatDate(emp.lastUpdate);
                // Get base data from EMPLOYEE_DATA
                const baseData = EMPLOYEE_DATA[emp.name] || {"כ": "", "כשירות": "", "אוכלוסיה": ""};

                html += `
                    <tr>
                        <td>${escapeHtml(emp.name)}</td>
                        <td>${escapeHtml(baseData["כ"])}</td>
                        <td>${escapeHtml(baseData["אוכלוסיה"])}</td>
                        <td><span class="status-badge ${statusClass}">${escapeHtml(emp.status)}</span></td>
                        <td class="last-update">${lastUpdate}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function getStatusClass(status) {
            const statusMap = {
                'בית': 'status-home',
                'בדרך לבית': 'status-going-home',
                'בסיס': 'status-base',
                'בדרך לבסיס': 'status-going-base',
                'רחובות': 'status-rehovot',
                'בדרך לרחובות': 'status-going-rehovot',
                '108': 'status-108'
            };
            return statusMap[status] || '';
        }

        function formatDate(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleString('he-IL', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
